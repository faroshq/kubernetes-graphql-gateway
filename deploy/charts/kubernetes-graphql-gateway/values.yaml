replicaCount: 1

image:
  repository: ghcr.io/faroshq/kubernetes-graphql-gateway
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

rbac:
  create: true

listener:
  provider: kubernetes
  anchorNamespace: default
  extraArgs: []
  resources: {}

gateway:
  port: 8080
  playground: false
  urlSuffix: /graphql
  corsAllowedOrigins: []
  corsAllowedHeaders: []
  extraArgs: []
  resources: {}

schemas:
  existingClaim: ""
  sizeLimit: 256Mi

service:
  type: ClusterIP
  port: 8080
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: graphql-gateway.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

podAnnotations: {}
podSecurityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}
