apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubernetes-graphql-gateway.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernetes-graphql-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubernetes-graphql-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubernetes-graphql-gateway.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kubernetes-graphql-gateway.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if eq .Values.schemaHandler "file" }}
      volumes:
        - name: schemas
          {{- if .Values.schemas.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.schemas.existingClaim }}
          {{- else }}
          emptyDir:
            sizeLimit: {{ .Values.schemas.sizeLimit }}
          {{- end }}
      {{- end }}
      containers:
        - name: listener
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default (.Chart.AppVersion | trimPrefix "v") }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/listener"]
          args:
            - "--schema-handler={{ .Values.schemaHandler }}"
            - "--multicluster-runtime-provider={{ .Values.listener.provider }}"
            - "--anchor-resource={{ .Values.listener.anchorResource }}"
            - "--reconciler-gvr={{ .Values.listener.reconcilerGVR }}"
            - "--metrics-bind-address=0"
            - "--enable-clusteraccess-controller={{ .Values.listener.enableClusterAccessController }}"
            {{- if eq .Values.schemaHandler "grpc" }}
            - "--grpc-listen-addr={{ .Values.listener.grpcListenAddr }}"
            {{- else }}
            - "--schemas-dir={{ .Values.listener.schemasDir }}"
            {{- end }}
            {{- range .Values.listener.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          {{- if eq .Values.schemaHandler "grpc" }}
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
          {{- end }}
          {{- if eq .Values.schemaHandler "file" }}
          volumeMounts:
            - name: schemas
              mountPath: {{ .Values.listener.schemasDir }}
          {{- end }}
          {{- with .Values.listener.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default (.Chart.AppVersion | trimPrefix "v") }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/gateway"]
          args:
            - "--schema-handler={{ .Values.schemaHandler }}"
            - "--gateway-port={{ .Values.gateway.port }}"
            - "--enable-playground={{ .Values.gateway.playground }}"
            - "--url-suffix={{ .Values.gateway.urlSuffix }}"
            {{- if eq .Values.schemaHandler "grpc" }}
            - "--grpc-listener-address={{ .Values.gateway.grpcListenerAddress }}"
            {{- else }}
            - "--schemas-dir={{ .Values.gateway.schemasDir }}"
            {{- end }}
            {{- range .Values.gateway.corsAllowedOrigins }}
            - "--cors-allowed-origins={{ . }}"
            {{- end }}
            {{- range .Values.gateway.corsAllowedHeaders }}
            - "--cors-allowed-headers={{ . }}"
            {{- end }}
            {{- range .Values.gateway.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          ports:
            - name: graphql
              containerPort: {{ .Values.gateway.port }}
              protocol: TCP
          {{- if eq .Values.schemaHandler "file" }}
          volumeMounts:
            - name: schemas
              mountPath: {{ .Values.gateway.schemasDir }}
          {{- end }}
          {{- with .Values.gateway.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
