apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubernetes-graphql-gateway.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernetes-graphql-gateway.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: graphql
      protocol: TCP
      name: graphql
  selector:
    {{- include "kubernetes-graphql-gateway.selectorLabels" . | nindent 4 }}
