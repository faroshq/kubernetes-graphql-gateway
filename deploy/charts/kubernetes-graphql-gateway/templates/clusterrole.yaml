{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubernetes-graphql-gateway.fullname" . }}
  labels:
    {{- include "kubernetes-graphql-gateway.labels" . | nindent 4 }}
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.platform-mesh.io"]
    resources: ["clusteraccesses"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["gateway.platform-mesh.io"]
    resources: ["clusteraccesses/status"]
    verbs: ["get", "update", "patch"]
{{- end }}
